name: Platform Release

on:
  workflow_dispatch:
    inputs:
      release_name:
        description: Release label for desktop/mobile artifacts
        required: false
        default: manual

permissions:
  contents: read

jobs:
  validate-boundary:
    name: Validate Control-Plane Boundary
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: code/pnpm-lock.yaml

      - name: Install workspace
        run: pnpm -C code install --frozen-lockfile --ignore-scripts

      - name: Cross-platform control check
        run: pnpm -C code platform:check

      - name: Buyer-safe copy check
        run: pnpm -C code copy:check

  package-matrix:
    name: Native Packaging Plan
    runs-on: ubuntu-latest
    needs: validate-boundary
    strategy:
      fail-fast: false
      matrix:
        target: [macos-tauri, windows-tauri, linux-tauri, android, ios]
    steps:
      - name: Packaging lane
        run: |
          echo "Release lane: ${{ matrix.target }}"
          echo "Native signing credentials are injected by protected buyer CI environments."
          echo "This workflow validates the release plan without exposing signing material."
