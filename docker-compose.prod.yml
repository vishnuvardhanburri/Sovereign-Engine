name: xavira-orbit

x-json-logging: &json-logging
  driver: json-file
  options:
    max-size: ${LOG_MAX_SIZE:-50m}
    max-file: ${LOG_MAX_FILE:-10}
    compress: "true"

x-app-environment: &app-environment
  NODE_ENV: production
  NODE_OPTIONS: ${NODE_OPTIONS:---require=/app/scripts/structured-console.cjs}
  LOG_FORMAT: ${LOG_FORMAT:-json}
  TLS_MIN_VERSION: ${TLS_MIN_VERSION:-TLSv1.3}
  REQUIRE_INTERNAL_TLS: ${REQUIRE_INTERNAL_TLS:-false}
  APP_DOMAIN: ${APP_DOMAIN:-localhost:3000}
  APP_PROTOCOL: ${APP_PROTOCOL:-http}
  DATABASE_URL: ${CONTAINER_DATABASE_URL:-postgresql://postgres:password@postgres:5432/xavira_orbit?sslmode=disable}
  REDIS_URL: ${CONTAINER_REDIS_URL:-redis://redis:6379}
  SEND_QUEUE: ${SEND_QUEUE:-xv-send-queue}
  SEND_DLQ: ${SEND_DLQ:-xv-send-dlq}
  XV_REGION: ${XV_REGION:-prod}
  SEND_ALLOW_UNKNOWN_VALIDATION: ${SEND_ALLOW_UNKNOWN_VALIDATION:-true}
  GLOBAL_SENDS_PER_MINUTE: ${GLOBAL_SENDS_PER_MINUTE:-120}
  GLOBAL_SHAPER_RATE_PER_SEC: ${GLOBAL_SHAPER_RATE_PER_SEC:-2}
  GLOBAL_SHAPER_BURST: ${GLOBAL_SHAPER_BURST:-10}
  PG_POOL_MAX: ${PG_POOL_MAX:-5}
  PG_POOL_IDLE_TIMEOUT_MS: ${PG_POOL_IDLE_TIMEOUT_MS:-30000}
  PG_POOL_CONNECTION_TIMEOUT_MS: ${PG_POOL_CONNECTION_TIMEOUT_MS:-5000}
  WORKER_HEARTBEAT_INTERVAL_MS: ${WORKER_HEARTBEAT_INTERVAL_MS:-15000}
  WORKER_ROTATION_SEND_LIMIT: ${WORKER_ROTATION_SEND_LIMIT:-5000}
  WORKER_ROTATION_MAX_AGE_MS: ${WORKER_ROTATION_MAX_AGE_MS:-86400000}
  WORKER_ROTATION_DRAIN_MS: ${WORKER_ROTATION_DRAIN_MS:-15000}
  SENDER_WORKER_CONCURRENCY: ${SENDER_WORKER_CONCURRENCY:-10}
  LEGACY_LOOP_BATCH_SIZE: ${LEGACY_LOOP_BATCH_SIZE:-10}
  FASTLANE_COMPLETION_BATCH_SIZE: ${FASTLANE_COMPLETION_BATCH_SIZE:-500}
  FASTLANE_COMPLETION_FLUSH_MS: ${FASTLANE_COMPLETION_FLUSH_MS:-500}
  ADAPTIVE_REDIS_PEERS: ${ADAPTIVE_REDIS_PEERS:-}
  LICENSING_CONTROL_URL: ${LICENSING_CONTROL_URL:-}
  LICENSING_KEY: ${LICENSING_KEY:-}
  LICENSING_HEARTBEAT_INTERVAL_MS: ${LICENSING_HEARTBEAT_INTERVAL_MS:-60000}
  LICENSING_FAIL_CLOSED: ${LICENSING_FAIL_CLOSED:-false}
  LICENSING_LOCK_TTL_SEC: ${LICENSING_LOCK_TTL_SEC:-120}
  REPUTATION_PUBLIC_API_KEY: ${REPUTATION_PUBLIC_API_KEY:-}
  PUBLIC_REPUTATION_FREE_DAILY_LIMIT: ${PUBLIC_REPUTATION_FREE_DAILY_LIMIT:-10}
  PUBLIC_REPUTATION_PRO_DAILY_LIMIT: ${PUBLIC_REPUTATION_PRO_DAILY_LIMIT:-1000}
  PUBLIC_REPUTATION_ENTERPRISE_DAILY_LIMIT: ${PUBLIC_REPUTATION_ENTERPRISE_DAILY_LIMIT:-100000}
  PUBLIC_REPUTATION_BLACKLIST_CACHE_SEC: ${PUBLIC_REPUTATION_BLACKLIST_CACHE_SEC:-21600}
  INVESTOR_LEAD_VALUE_USD: ${INVESTOR_LEAD_VALUE_USD:-0.75}
  COST_PER_SEND: ${COST_PER_SEND:-0.002}
  ROI_INBOX_LEAD_VALUE_USD: ${ROI_INBOX_LEAD_VALUE_USD:-0.75}
  ROI_COST_PER_SEND_USD: ${ROI_COST_PER_SEND_USD:-0.002}
  ROI_INFRA_DAILY_USD: ${ROI_INFRA_DAILY_USD:-0}
  ROI_PROXY_DAILY_USD: ${ROI_PROXY_DAILY_USD:-0}
  ROI_DOMAIN_DAILY_USD: ${ROI_DOMAIN_DAILY_USD:-0}
  CONTENT_MUTATION_ENABLED: ${CONTENT_MUTATION_ENABLED:-false}
  CONTENT_MUTATION_ENDPOINT: ${CONTENT_MUTATION_ENDPOINT:-http://ollama:11434/api/generate}
  CONTENT_MUTATION_MODEL: ${CONTENT_MUTATION_MODEL:-llama3:8b}
  CONTENT_MUTATION_POOL_SIZE: ${CONTENT_MUTATION_POOL_SIZE:-500}
  CONTENT_MUTATION_FILL_PER_LOCK: ${CONTENT_MUTATION_FILL_PER_LOCK:-500}
  CONTENT_MUTATION_TIMEOUT_MS: ${CONTENT_MUTATION_TIMEOUT_MS:-12000}
  CONTENT_MUTATION_POOL_TTL_SEC: ${CONTENT_MUTATION_POOL_TTL_SEC:-86400}
  MOCK_SMTP: ${MOCK_SMTP:-true}
  MOCK_SMTP_FASTLANE: ${MOCK_SMTP_FASTLANE:-false}
  SMTP_HOST: ${SMTP_HOST:-mock.local}
  SMTP_PORT: ${SMTP_PORT:-587}
  SMTP_USER: ${SMTP_USER:-mock@localhost}
  SMTP_PASS: ${SMTP_PASS:-mock}
  SMTP_SECURE: ${SMTP_SECURE:-false}
  SMTP_ACCOUNTS: ${SMTP_ACCOUNTS:-}
  ZEROBOUNCE_API_KEY: ${ZEROBOUNCE_API_KEY:-mock}
  CRON_SECRET: ${CRON_SECRET:-change-me}
  AUTH_SECRET: ${AUTH_SECRET:-change-me}
  SECURITY_KILL_SWITCH_TOKEN: ${SECURITY_KILL_SWITCH_TOKEN:-change-me}
  SECRET_MASTER_KEY_ID: ${SECRET_MASTER_KEY_ID:-v1}
  SECRET_MASTER_KEY: ${SECRET_MASTER_KEY:-}
  SECRET_MASTER_KEYS: ${SECRET_MASTER_KEYS:-}

x-app-service: &app-service
  build:
    context: .
    dockerfile: Dockerfile
  environment: *app-environment
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  logging: *json-logging
  deploy:
    resources:
      limits:
        cpus: ${APP_CPU_LIMIT:-1.0}
        memory: ${APP_MEMORY_LIMIT:-768M}
      reservations:
        cpus: ${APP_CPU_RESERVATION:-0.25}
        memory: ${APP_MEMORY_RESERVATION:-256M}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xavira_orbit}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - xavira_orbit_pgdata:/var/lib/postgresql/data
    logging: *json-logging
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-xavira_orbit}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - xavira_orbit_redisdata:/data
    logging: *json-logging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  migrate:
    <<: *app-service
    environment:
      <<: *app-environment
      SERVICE_NAME: migrate
    restart: "no"
    command: ["sh", "-lc", "node scripts/sync-env.mjs && pnpm db:init"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api-gateway:
    <<: *app-service
    environment:
      <<: *app-environment
      SERVICE_NAME: api-gateway
    restart: unless-stopped
    command: ["sh", "-lc", "node scripts/sync-env.mjs && pnpm -C apps/api-gateway start -p 3000"]
    ports:
      - "${API_PORT:-3000}:3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health/stats?client_id=1').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s

  reputation-worker:
    <<: *app-service
    environment:
      <<: *app-environment
      SERVICE_NAME: reputation-worker
    restart: unless-stopped
    command: ["sh", "-lc", "node scripts/sync-env.mjs && pnpm -C workers/reputation-worker start"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  sender-worker:
    <<: *app-service
    environment:
      <<: *app-environment
      SERVICE_NAME: sender-worker
    restart: unless-stopped
    command: ["sh", "-lc", "node scripts/sync-env.mjs && pnpm -C workers/sender-worker start"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: ${SENDER_REPLICAS:-2}
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: ${SENDER_CPU_LIMIT:-1.0}
          memory: ${SENDER_MEMORY_LIMIT:-768M}
        reservations:
          cpus: ${SENDER_CPU_RESERVATION:-0.25}
          memory: ${SENDER_MEMORY_RESERVATION:-256M}

  sender-autoscaler:
    image: docker:29-cli
    profiles: ["ops"]
    restart: unless-stopped
    working_dir: /workspace
    depends_on:
      api-gateway:
        condition: service_healthy
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-xavira-orbit}
      COMPOSE_FILE: /workspace/docker-compose.prod.yml
      AUTOSCALE_SERVICE: sender-worker
      AUTOSCALE_HEALTH_URL: ${AUTOSCALE_HEALTH_URL:-http://api-gateway:3000/api/health/stats?client_id=1}
      SENDER_MIN_REPLICAS: ${SENDER_MIN_REPLICAS:-2}
      SENDER_MAX_REPLICAS: ${SENDER_MAX_REPLICAS:-24}
      AUTOSCALE_CPU_HIGH: ${AUTOSCALE_CPU_HIGH:-70}
      AUTOSCALE_CPU_LOW: ${AUTOSCALE_CPU_LOW:-25}
      AUTOSCALE_MEM_HIGH: ${AUTOSCALE_MEM_HIGH:-80}
      AUTOSCALE_TARGET_WAITING_PER_REPLICA: ${AUTOSCALE_TARGET_WAITING_PER_REPLICA:-500}
      AUTOSCALE_QUEUE_HIGH: ${AUTOSCALE_QUEUE_HIGH:-1000}
      AUTOSCALE_QUEUE_LOW: ${AUTOSCALE_QUEUE_LOW:-25}
      AUTOSCALE_SCALE_DOWN_IDLE_WINDOWS: ${AUTOSCALE_SCALE_DOWN_IDLE_WINDOWS:-4}
      AUTOSCALE_INTERVAL_SECONDS: ${AUTOSCALE_INTERVAL_SECONDS:-30}
      AUTOSCALE_COOLDOWN_SECONDS: ${AUTOSCALE_COOLDOWN_SECONDS:-120}
      AUTOSCALE_DRY_RUN: ${AUTOSCALE_DRY_RUN:-false}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/workspace:ro
    entrypoint:
      [
        "sh",
        "-lc",
        "apk add --no-cache curl jq >/dev/null && /workspace/scripts/compose-autoscale.sh"
      ]
    logging: *json-logging

  ollama:
    image: ollama/ollama:latest
    profiles: ["content-ai"]
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - xavira_orbit_ollama:/root/.ollama
    logging: *json-logging

  ollama-pull:
    image: ollama/ollama:latest
    profiles: ["content-ai"]
    restart: "no"
    environment:
      OLLAMA_HOST: http://ollama:11434
    entrypoint:
      [
        "sh",
        "-lc",
        "sleep 8 && ollama pull ${CONTENT_MUTATION_MODEL:-llama3:8b}"
      ]
    depends_on:
      - ollama
    logging: *json-logging

  log-archive:
    image: alpine:3.20
    profiles: ["ops"]
    restart: unless-stopped
    environment:
      LOG_ARCHIVE_S3_URI: ${LOG_ARCHIVE_S3_URI:-}
      LOG_ARCHIVE_AFTER_DAYS: ${LOG_ARCHIVE_AFTER_DAYS:-30}
      LOG_ARCHIVE_INTERVAL_SECONDS: ${LOG_ARCHIVE_INTERVAL_SECONDS:-86400}
      LOG_ARCHIVE_STORAGE_CLASS: ${LOG_ARCHIVE_STORAGE_CLASS:-DEEP_ARCHIVE}
      AWS_REGION: ${AWS_REGION:-eu-north-1}
    volumes:
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./scripts:/workspace/scripts:ro
    entrypoint:
      [
        "sh",
        "-lc",
        "apk add --no-cache aws-cli gzip findutils >/dev/null && /workspace/scripts/archive-docker-logs.sh"
      ]
    logging: *json-logging

volumes:
  xavira_orbit_pgdata:
  xavira_orbit_redisdata:
  xavira_orbit_ollama:
